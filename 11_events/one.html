<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Events</title>
</head>
<body>
   <h1>HTML events </h1>
   <!-- first approach to use events (Not recommended) -->
   <!-- <img src="" alt="" class="" onclick="alert('clicked)"> -->
</body>
 <script>
        // All events in js are run sequentially.
        
        // second approach to use event in js. 
        
        // document.getElementById('owl').onclick = function(){
        //     alert("owl clicked")
        // }

    // Third approach to use event in js(Best approach)

        document.getElementById('owl').addEventListener('click', function(){
            alert("owl clicked")
        }, false)   //third parameter is false. and this third parameter is by default false. we can also set this true acc. to requirement.

    // attachEvent() => method use in early time
    // jQuery - on event listener hota tha jQuery me.

     document.getElementById('owl').addEventListener('click', function(e){
        // e => event object 
        console.log("owl clicked");
        e.stopPropagation() //bubbling ko stop krne ke liye use krte h(sirf wahi event show hoga jispr click hua h wo nhi jiske inside wo element h like <ul><img></ul>)
        }, false)   

        // Event propagation (true/false)=> has two context : 1- Event Bubbling(bydefault false ko bolte h event bubbling)=> bottom to top,
        //  2- Event capturing(true)=> top to bottom.

    //STUDY ALL THESE TOPICS:     
    // type , timestamp , defaultPrevented , target , toElement , srcElement , currentTarget

    //important for interview=> clientX kya hai, client ka Y kya hai, screenX , screenY.

    //altkey, ctrlkey, shiftkey, keyCode.


    document.querySelector('#images'),addEventListener('click', function(e){
        console.log(e.target.tagName);
        if(e.target.tagName === 'IMG'){
            let removeIt = e.target.parentNode
        removeIt.remove() //first way to remove
        // removeIt.parentNode.removeChild(removeIt) // another way.
        }
            
    },false)

 
    </script>
</html>
